name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test package
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Setup zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.1

      - name: Set LF line endings on Windows
        if: runner.os == 'Windows'
        run: |-
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build binary
        run: zig build

      - name: Run tests
        run: zig build test

  publish:
    name: Build and publish container image
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      - name: Build and publish
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-release:
    name: Build release package
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-windows-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.1

      - name: Build binary
        run: zig build -Dtarget=${{ matrix.target }} -Drelease=true

      - name: Copy extra files for inclusion into archive
        run: cp .schema.json config.example.json README.md UNLICENSE zig-out/bin/

      - name: Build archive for Linux
        if: "!contains(matrix.target, 'windows')"
        run: >
          tar czf bgpd-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C zig-out/bin
          bgpd .schema.json config.example.json README.md UNLICENSE

      - name: Build archive for Windows
        if: contains(matrix.target, 'windows')
        run: >
          cd zig-out/bin && zip ../../bgpd-${{ github.ref_name }}-${{ matrix.target }}.zip
          bgpd.exe .schema.json config.example.json README.md UNLICENSE

      - name: Upload archive as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bgpd-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build-release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          merge-multiple: true

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            *.tar.gz
            *.zip
